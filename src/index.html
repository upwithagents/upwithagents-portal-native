<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UpWithAgents</title>
  </head>

  <body>
    <div id="boot-screen">
      <svg id="ascent-mark" viewBox="0 0 500 320" fill="none" aria-hidden="true">
        <defs>
          <linearGradient id="ascent-dawn" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0" stop-color="#ff5a1f" />
            <stop offset="1" stop-color="#e8a200" />
          </linearGradient>
        </defs>
        <path
          d="M 14 296 L 96 296 L 96 246 L 178 246 L 178 262 L 252 262 L 252 196 L 336 196 L 336 128 L 418 128 L 418 46"
          stroke="url(#ascent-dawn)"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <circle
          id="ascent-light"
          r="5"
          fill="#ff7a42"
          style="offset-path: path('M 14 296 L 96 296 L 96 246 L 178 246 L 178 262 L 252 262 L 252 196 L 336 196 L 336 128 L 418 128 L 418 46'); offset-rotate: 0deg"
        />
        <path
          d="M50,30 L78,66 L50,55 L22,66 Z"
          fill="#e8a200"
          transform="translate(418,46) scale(0.5) translate(-50,-66)"
        />
      </svg>
      <h1 id="brand-mark">
        <svg viewBox="0 0 100 100" width="32" height="32" class="brand-icon" aria-hidden="true">
          <defs>
            <clipPath id="uwa-sq"><rect width="100" height="100" rx="22" /></clipPath>
            <linearGradient id="uwa-cA" x1="56" y1="0" x2="100" y2="44" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#FFB020" />
              <stop offset="1" stop-color="#EB4E10" />
            </linearGradient>
            <linearGradient id="uwa-cB" x1="0" y1="56" x2="44" y2="100" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#EB4E10" />
              <stop offset="1" stop-color="#B8380A" />
            </linearGradient>
          </defs>
          <g clip-path="url(#uwa-sq)">
            <rect width="100" height="100" fill="#14100c" />
            <path d="M56,0 L100,0 L100,44 Z" fill="url(#uwa-cA)" />
            <path d="M0,56 L0,100 L44,100 Z" fill="url(#uwa-cB)" />
            <path d="M50,25 L86,71 L50,57 L14,71 Z" fill="#fff8f0" />
          </g>
        </svg>
        <span class="brand-wordmark">up<span class="brand-accent">w<span class="brand-flag-wrap">ı<span class="brand-flag"><svg viewBox="0 0 100 100" aria-hidden="true"><path d="M50,30 L78,66 L50,55 L22,66 Z" fill="currentColor" /></svg></span></span>th</span>agents</span>
      </h1>
      <div id="progress-track"><div id="progress-fill"></div></div>
      <p id="progress-caption">Starting…</p>
      <button id="details-toggle" type="button">Show details</button>
      <div id="details">
        <ul id="status-list"></ul>
        <div id="debug-log"></div>
      </div>
    </div>
    <iframe id="portal-frame" title="upwithagents portal"></iframe>
    <script type="module" src="/main.js" defer></script>
  </body>
</html>
